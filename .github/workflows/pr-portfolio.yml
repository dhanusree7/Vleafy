name: Update PR Portfolio

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate PR Portfolio
        uses: stargalax/pr-portfolio-action@main
        with:
          username: dhanusree7

      - name: Check generated files
        run: |
          ls -la
          ls -la output

      - name: Commit changes
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add README.md output/prs.json

          git diff --cached --quiet || git commit -m "Update PR portfolio"

          git push
